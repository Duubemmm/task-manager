services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  backend:
    image: ghcr.io/duubemmm/task-manager-backend:latest
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongo:27017/taskmanager
    networks:
      - app-network
    depends_on:
      - mongo

  frontend:
    image: ghcr.io/duubemmm/task-manager-frontend:latest
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - backend

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge